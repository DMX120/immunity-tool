<!DOCTYPE html>
<html>
<head>
  <title>Immunity Test</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .progress {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .bar {
      height: 10px;
      background: #28a745;
      width: 20%;
      border-radius: 5px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 6px;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🧪 Immunity Test</h2>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <form id="form" action="/result" method="post">

    <div class="step" id="step1">
      <p>Do you get sick often?</p>
      <select name="q1">
        <option value="1">Yes</option>
        <option value="3">Sometimes</option>
        <option value="5">No</option>
      </select>
      <button type="button" onclick="next(1)">Next</button>
    </div>

    <div class="step hidden" id="step2">
      <p>Do you sleep well?</p>
      <select name="q2">
        <option value="1">No</option>
        <option value="3">Sometimes</option>
        <option value="5">Yes</option>
      </select>
      <button type="button" onclick="next(2)">Next</button>
    </div>

    <div class="step hidden" id="step3">
      <p>Stress level?</p>
      <select name="q3">
        <option value="1">High</option>
        <option value="3">Medium</option>
        <option value="5">Low</option>
      </select>
      <button type="button" onclick="next(3)">Next</button>
    </div>

    <div class="step hidden" id="step4">
      <p>Healthy diet?</p>
      <select name="q4">
        <option value="1">No</option>
        <option value="3">Sometimes</option>
        <option value="5">Yes</option>
      </select>
      <button type="button" onclick="next(4)">Next</button>
    </div>

    <div class="step hidden" id="step5">
      <p>Energy level?</p>
      <select name="q5">
        <option value="1">Low</option>
        <option value="3">Medium</option>
        <option value="5">High</option>
      </select>
      <button type="submit">See My Result</button>
    </div>

  </form>

</div>

<script>
function next(step) {
  document.getElementById("step"+step).classList.add("hidden");
  document.getElementById("step"+(step+1)).classList.remove("hidden");

  let percent = (step+1)*20;
  document.getElementById("bar").style.width = percent + "%";
}
</script>

</body>
</html>
